apiVersion: v1
kind: Secret
metadata:
  name: pipelinepulse-secrets
  namespace: pipelinepulse
type: Opaque
stringData:
  # Database Auth
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "<change-me-in-production>"
  POSTGRES_DB: "pipelinepulse"
  
  # Backend
  DATABASE_URL: "postgresql+asyncpg://postgres:<change-me-in-production>@postgres-service.pipelinepulse.svc.cluster.local:5432/pipelinepulse"
  JWT_SECRET: "<change-me-to-a-secure-random-string>"
  
  # Pipeline Integrations
  OPENWEATHER_API_KEY: "<your-openweather-api-key>"
  GITHUB_TOKEN: "<your-github-personal-access-token>"
  
  # Airflow
  AIRFLOW__CORE__FERNET_KEY: "<base64-encoded-fernet-key>"
  AIRFLOW_DB_PASSWORD: "<change-me-in-production>"
