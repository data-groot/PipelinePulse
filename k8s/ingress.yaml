apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pipelinepulse-ingress
  namespace: pipelinepulse
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/websocket-services: "backend-service"
spec:
  rules:
  - host: pipelinepulse.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 3000
      - path: /airflow
        pathType: Prefix
        backend:
          service:
            name: airflow-webserver-service
            port:
              number: 8080
