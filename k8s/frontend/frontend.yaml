apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pipelinepulse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: pipelinepulse-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: pipelinepulse-config
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: pipelinepulse
spec:
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    app: frontend
