version: 2

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: user_id
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ['completed', 'pending', 'returned']

  - name: stg_users
    columns:
      - name: user_id
        tests:
          - not_null
          - unique

  - name: stg_commits
    columns:
      - name: sha
        tests:
          - not_null
          - unique

  - name: stg_prs
    columns:
      - name: pr_id
        tests:
          - not_null
          - unique
