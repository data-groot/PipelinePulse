version: "3.9"

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pipelinepulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-pipelinepulse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pipelinepulse}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipelinepulse-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pipelinepulse}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      JWT_ALGORITHM: HS256
      JWT_EXPIRY_MINUTES: 60
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pipelinepulse-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ── dbt Runner ───────────────────────────────────────────────
  dbt-runner:
    image: ghcr.io/dbt-labs/dbt-postgres:1.7.latest  # Keeping to highly stable 1.7 layer natively
    container_name: pipelinepulse-dbt
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DBT_HOST: postgres
      DBT_USER: ${POSTGRES_USER:-postgres}
      DBT_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DBT_PORT: 5432
      DBT_DATABASE: ${POSTGRES_DB:-pipelinepulse}
    volumes:
      - ./dbt:/usr/app
    working_dir: /usr/app

  # ── Airflow ──────────────────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.9.0-python3.12
    container_name: pipelinepulse-airflow-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/pipelinepulse
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/requirements.txt:/opt/airflow/requirements.txt
      - ./dbt:/opt/airflow/dbt
    command: bash -c "pip install -r /opt/airflow/requirements.txt && pip install dbt-postgres==1.8.2 && airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com && airflow webserver"

  airflow-scheduler:
    image: apache/airflow:2.9.0-python3.12
    container_name: pipelinepulse-airflow-scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/pipelinepulse
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/requirements.txt:/opt/airflow/requirements.txt
      - ./dbt:/opt/airflow/dbt
    command: bash -c "pip install -r /opt/airflow/requirements.txt && pip install dbt-postgres==1.8.2 && airflow scheduler"

volumes:
  postgres_data:
